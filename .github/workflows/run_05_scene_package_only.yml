# Save as: .github/workflows/run_05_scene_package_only.yml
name: Run 05 Scene Package Only

on:
  workflow_dispatch:
    inputs:
      week_end_date:
        description: 'Target weekly folder end date, e.g. 2026-05-21'
        required: false
        default: ''

permissions:
  contents: write

env:
  GEMINI_MODEL: gemini-2.5-pro
  GEMINI_FALLBACK_MODELS: gemini-3.1-flash-lite,gemini-2.5-flash
  GEMINI_TIMEOUT_SECONDS: 180
  GEMINI_MAX_RETRIES: 1
  GEMINI_RETRY_SLEEP_SECONDS: 15

jobs:
  run-05-scene-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve env
        run: |
          echo "WEEK_END_DATE=${{ github.event.inputs.week_end_date }}" >> $GITHUB_ENV

      - name: Run 05 scene package only
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/05_generate_weekly_scene_package.py

      - name: Commit 05 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/weekly/**/weekly_scene_package.json || true
          git add output/weekly/**/weekly_narration.json output/weekly/**/weekly_narration_full.txt || true
          git add output/weekly/**/narration/weekly_scene_package.json output/weekly/**/narration/weekly_narration.json || true
          git add output/weekly/**/prompts/05_scene_package_prompt.txt || true
          git diff --cached --quiet && echo "No 05 output changes to commit." && exit 0
          git commit -m "build: run 05 scene package only"
          git push
