# 請在 GitHub 建立這個檔案
#
# 檔案路徑：
# .github/workflows/build_weekly_scene.yml
#
# 功能：
# 1. 手動執行或每週五早上自動執行
# 2. 安裝 Python 套件
# 3. 執行 scripts/01_build_weekly_scene.py
# 4. 將產出的 output/weekly/YYYY-MM-DD/weekly_video_scene.json 自動 commit 回 repo

name: Build Weekly Video Scene JSON

on:
  workflow_dispatch:

  # 每週五 00:00 UTC 執行
  # 約等於台灣時間每週五 08:00
  schedule:
    - cron: "0 0 * * 5"

permissions:
  contents: write

jobs:
  build-weekly-scene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build weekly video scene JSON
        run: |
          python scripts/01_build_weekly_scene.py

      - name: Commit generated weekly scene JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly video scene JSON"
            git push
          fi
