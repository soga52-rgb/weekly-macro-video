name: Build Weekly Video Outputs

on:
  workflow_dispatch:

  # 每週五 00:00 UTC 執行
  # 約等於台灣時間每週五 08:00
  schedule:
    - cron: "0 0 * * 5"

permissions:
  contents: write

jobs:
  build-weekly-video-outputs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build weekly facts JSON
        run: |
          python scripts/01_build_weekly_facts.py

      - name: Build weekly video scene JSON
        run: |
          python scripts/01_build_weekly_scene.py

      - name: Generate weekly cards
        run: |
          python scripts/02_generate_cards.py

      - name: Commit generated weekly outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly facts, scene JSON and cards"
            git push
          fi
