name: Build Weekly Image Cards

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-weekly-image-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.1-flash-lite-preview
      GEMINI_IMAGE_MODEL: gemini-3.1-flash-image-preview
      GEMINI_IMAGE_TIMEOUT_SEC: "600"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate weekly image cards
        run: |
          python scripts/04_generate_cards_with_image_model.py --limit 1 --no-fail

      - name: Commit generated image cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly image cards"
            git push
          fi
