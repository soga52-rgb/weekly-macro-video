# Save as: .github/workflows/run_04_page_only.yml
name: Run 04 Macro Page Only

on:
  workflow_dispatch:
    inputs:
      week_end_date:
        description: 'Target weekly folder end date, e.g. 2026-05-21'
        required: true
        default: '2026-05-21'

permissions:
  contents: write

jobs:
  run-04-page-only:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build weekly macro page only
        run: |
          python scripts/04_build_weekly_macro_page.py --week-dir "output/weekly/${{ github.event.inputs.week_end_date }}"

      - name: Commit weekly macro page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/weekly/${{ github.event.inputs.week_end_date }}/index.html || true
          git diff --cached --quiet && echo "No page changes to commit." && exit 0
          git commit -m "build: update weekly macro page only"
          git push
