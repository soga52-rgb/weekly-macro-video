name: 94 Test Generate Video Dialogue Script

on:
  workflow_dispatch:
    inputs:
      week_dir:
        description: "Optional week folder under output/weekly, e.g. 2026-05-21. Leave blank to use latest."
        required: false
        default: ""
      dialogue_model:
        description: "Gemini dialogue model"
        required: false
        default: "gemini-3.5-pro"
      dialogue_temperature:
        description: "Dialogue generation temperature"
        required: false
        default: "0.6"

permissions:
  contents: write

jobs:
  generate-video-dialogue-script:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_DIALOGUE_MODEL: ${{ inputs.dialogue_model }}
      DIALOGUE_TEMPERATURE: ${{ inputs.dialogue_temperature }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run 94 test dialogue script generation
        run: |
          SCRIPT_PATH="scripts/94_test_generate_video_dialogue_script.py"

          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "Missing $SCRIPT_PATH"
            echo "Available 94 scripts:"
            ls -la scripts/94* || true
            exit 1
          fi

          if [ -n "${{ inputs.week_dir }}" ]; then
            python "$SCRIPT_PATH" --week-dir "${{ inputs.week_dir }}"
          else
            python "$SCRIPT_PATH"
          fi

      - name: Commit dialogue script
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/**/video_dialogue_script.md || true
          git add output/weekly/**/video_dialogue_script.json || true

          if git diff --cached --quiet; then
            echo "No dialogue script changes to commit."
          else
            git commit -m "Test video dialogue script"
            git push
          fi

      - name: Upload dialogue artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-video-dialogue-script
          path: |
            output/weekly/**/video_dialogue_script.md
            output/weekly/**/video_dialogue_script.json
          if-no-files-found: warn
