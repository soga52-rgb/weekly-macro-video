name: 95 Test Generate TTS Audio

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tts:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TTS_MODEL: gemini-3.1-flash-tts-preview
      TOM_VOICE: Puck
      MIRANDA_VOICE: Kore
      FORCE_REGENERATE_TTS: "false"
      TTS_DRY_RUN: "true"
      TTS_TURN_PAUSE_MS: "180"
      TTS_SCENE_PAUSE_MS: "700"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check files
        run: |
          ls -la
          ls -la scripts || true
          ls -la output/weekly/2026-05-21 || true
          test -f scripts/95_generate_tts_audio_from_dialogue.py
          test -f output/weekly/2026-05-21/video_dialogue_script.json

      - name: Run dry-run TTS
        run: |
          python scripts/95_generate_tts_audio_from_dialogue.py --week-dir 2026-05-21 --dry-run

      - name: Show outputs
        if: always()
        run: |
          find output/weekly -name "tts_audio_manifest.json" -type f | sort || true
