name: Build Weekly Full Video

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-weekly-full-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.1-flash-lite-preview
      GEMINI_IMAGE_MODEL: gemini-3.1-flash-image-preview
      GEMINI_IMAGE_TIMEOUT_SEC: "600"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install gTTS

      - name: Build weekly facts JSON
        run: |
          python scripts/01_build_weekly_facts.py

      - name: Generate weekly video brief
        run: |
          python scripts/02_generate_weekly_brief.py

      - name: Generate weekly image prompts
        run: |
          python scripts/03_generate_image_prompts.py

      - name: Generate narration scripts
        run: |
          python scripts/05_generate_narration.py

      - name: Generate TTS audio
        run: |
          python scripts/06_generate_tts.py

      - name: Build final video with FFmpeg
        run: |
          python scripts/07_build_video_ffmpeg.py

      - name: Commit generated weekly video outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly full video"
            git push
          fi
