name: Build Weekly News Context

on:
  workflow_dispatch:
    inputs:
      target_week_end_date:
        description: "Target output weekly folder end date, e.g. 2026-05-28. Leave blank for endpoint default."
        required: false
        default: ""
        type: string
      analysis_start_date:
        description: "Formal analysis window start date, e.g. 2026-05-22. Leave blank for endpoint default."
        required: false
        default: ""
        type: string
      analysis_end_date:
        description: "Formal analysis window end date, e.g. 2026-05-28. Leave blank for endpoint default."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-weekly-news-context:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      WEEKLY_SOURCE_URL: ${{ secrets.WEEKLY_SOURCE_URL }}
      TODAY_DAILY_SOURCE_URL: ${{ secrets.TODAY_DAILY_SOURCE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.5-flash
      WEEKLY_NEWS_MAX_ITEMS: "30"
      TARGET_WEEK_END_DATE: ${{ inputs.target_week_end_date }}
      ANALYSIS_START_DATE: ${{ inputs.analysis_start_date }}
      ANALYSIS_END_DATE: ${{ inputs.analysis_end_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve target week dir
        run: |
          if [ -n "${TARGET_WEEK_END_DATE}" ]; then
            echo "WEEK_DIR=output/weekly/${TARGET_WEEK_END_DATE}" >> "$GITHUB_ENV"
          elif [ -n "${ANALYSIS_END_DATE}" ]; then
            echo "WEEK_DIR=output/weekly/${ANALYSIS_END_DATE}" >> "$GITHUB_ENV"
          else
            echo "WEEK_DIR=" >> "$GITHUB_ENV"
          fi

      - name: Fetch weekly source from Apps Script
        run: |
          if [ -n "${WEEK_DIR}" ]; then
            python scripts/00_fetch_weekly_source_from_apps_script.py \
              --week-dir "${WEEK_DIR}" \
              --start "${ANALYSIS_START_DATE}" \
              --end "${ANALYSIS_END_DATE}"
          else
            python scripts/00_fetch_weekly_source_from_apps_script.py \
              --start "${ANALYSIS_START_DATE}" \
              --end "${ANALYSIS_END_DATE}"
          fi

      - name: Build weekly news context
        run: |
          if [ -n "${WEEK_DIR}" ]; then
            python scripts/00_fetch_weekly_news_context.py \
              --week-dir "${WEEK_DIR}" \
              --start "${ANALYSIS_START_DATE}" \
              --end "${ANALYSIS_END_DATE}"
          else
            python scripts/00_fetch_weekly_news_context.py \
              --start "${ANALYSIS_START_DATE}" \
              --end "${ANALYSIS_END_DATE}"
          fi

      - name: Commit weekly news context
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/weekly_video_source.json data/weekly_news_raw.json output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly news context"
            git push
          fi
