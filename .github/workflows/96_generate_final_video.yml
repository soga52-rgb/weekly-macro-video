name: 96 Generate Final Video

on:
  workflow_dispatch:
    inputs:
      week_dir:
        description: "Weekly folder name under output/weekly, e.g. 2026-05-21. Leave blank to use latest."
        required: false
        default: ""
      subtitle_source:
        description: "Subtitle source: spoken shows full script chunks; subtitle shows short subtitle_text."
        required: false
        default: "spoken"
      add_waveform:
        description: "Show waveform at bottom right"
        required: false
        default: "true"
      keep_frames:
        description: "Keep generated intermediate frames"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  generate-video:
    runs-on: ubuntu-latest

    env:
      VIDEO_SUBTITLE_SOURCE: ${{ github.event.inputs.subtitle_source || 'spoken' }}
      VIDEO_ADD_WAVEFORM: ${{ github.event.inputs.add_waveform || 'true' }}
      VIDEO_KEEP_FRAMES: ${{ github.event.inputs.keep_frames || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ffmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Check required files
        shell: bash
        run: |
          test -f scripts/96_generate_final_video_from_tts.py || (echo "Missing scripts/96_generate_final_video_from_tts.py" && exit 1)

          if [ -n "${{ github.event.inputs.week_dir }}" ]; then
            TARGET_WEEK="output/weekly/${{ github.event.inputs.week_dir }}"
          else
            TARGET_WEEK=$(find output/weekly -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)
          fi

          echo "[INFO] TARGET_WEEK=${TARGET_WEEK}"
          test -n "${TARGET_WEEK}" || (echo "No weekly folder found" && exit 1)
          test -f "${TARGET_WEEK}/video_dialogue_script.json" || (echo "Missing video_dialogue_script.json" && exit 1)
          test -f "${TARGET_WEEK}/tts_audio_manifest.json" || (echo "Missing tts_audio_manifest.json" && exit 1)
          test -f "${TARGET_WEEK}/tts_audio/full_dialogue.wav" || (echo "Missing tts_audio/full_dialogue.wav" && exit 1)
          test -d "${TARGET_WEEK}/visual_sequence_images" || (echo "Missing visual_sequence_images" && exit 1)

          echo "[INFO] assets"
          ls -la assets || true

      - name: Generate final video
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.week_dir }}" ]; then
            python scripts/96_generate_final_video_from_tts.py --week-dir "${{ github.event.inputs.week_dir }}"
          else
            python scripts/96_generate_final_video_from_tts.py
          fi

      - name: Show outputs
        if: always()
        shell: bash
        run: |
          echo "[INFO] Final video files"
          find output/weekly -path "*/final/*" -type f | sort || true

      - name: Commit final video outputs
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/weekly/*/final || true

          if git diff --cached --quiet; then
            echo "No generated final video changes to commit."
          else
            git commit -m "Generate weekly macro final video"
            git push
          fi
