name: Build Weekly Forest Summary

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-weekly-forest-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      WEEKLY_SOURCE_URL: ${{ secrets.WEEKLY_SOURCE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.5-flash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch weekly source from Apps Script
        run: |
          python scripts/00_fetch_weekly_source_from_apps_script.py

      - name: Generate weekly forest summary
        run: |
          python scripts/01_generate_weekly_forest_summary.py

      - name: Commit weekly forest summary
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/weekly_video_source.json output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly forest summary"
            git push
          fi
