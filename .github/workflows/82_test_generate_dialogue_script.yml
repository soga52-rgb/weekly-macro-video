name: 82 Test Generate Story-only Dialogue v8.11.2

on:
  workflow_dispatch:
    inputs:
      week_dir:
        description: "Optional week directory, e.g. 2026-05-28 or output/weekly/2026-05-28. Leave blank to use latest or analysis_end_date."
        required: false
        default: ""
      analysis_start_date:
        description: "Formal analysis window start date, e.g. 2026-05-22"
        required: false
        default: ""
      analysis_end_date:
        description: "Formal analysis window end date, e.g. 2026-05-28"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate-story-dialogue:
    runs-on: ubuntu-latest

    env:
      INPUT_WEEK_DIR: ${{ github.event.inputs.week_dir }}
      ANALYSIS_START_DATE: ${{ github.event.inputs.analysis_start_date }}
      ANALYSIS_END_DATE: ${{ github.event.inputs.analysis_end_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve target week dir
        run: |
          if [ -n "${INPUT_WEEK_DIR}" ]; then
            case "${INPUT_WEEK_DIR}" in
              output/weekly/*)
                echo "WEEK_DIR=${INPUT_WEEK_DIR}" >> "$GITHUB_ENV"
                ;;
              *)
                echo "WEEK_DIR=output/weekly/${INPUT_WEEK_DIR}" >> "$GITHUB_ENV"
                ;;
            esac
          elif [ -n "${ANALYSIS_END_DATE}" ]; then
            echo "WEEK_DIR=output/weekly/${ANALYSIS_END_DATE}" >> "$GITHUB_ENV"
          else
            echo "WEEK_DIR=" >> "$GITHUB_ENV"
          fi

      - name: Generate story-only dialogue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
        run: |
          python scripts/82_test_generate_dialogue_script.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -n "${WEEK_DIR}" ]; then
            git add "${WEEK_DIR}/weekly_dialogue_story_only_v8.json" || true
            git add "${WEEK_DIR}/weekly_dialogue_story_only_v8.md" || true
            git add "${WEEK_DIR}/weekly_dialogue_story_only_v8_prompt_debug.txt" || true
          else
            git add output/weekly/**/weekly_dialogue_story_only_v8.json || true
            git add output/weekly/**/weekly_dialogue_story_only_v8.md || true
            git add output/weekly/**/weekly_dialogue_story_only_v8_prompt_debug.txt || true
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate Step 82 v8 story-only dialogue"
            git push
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: step82-v8-story-dialogue
          path: |
            output/weekly/**/weekly_dialogue_story_only_v8.json
            output/weekly/**/weekly_dialogue_story_only_v8.md
            output/weekly/**/weekly_dialogue_story_only_v8_prompt_debug.txt
          if-no-files-found: warn
