name: 82 Test Generate Story-only Dialogue v8.7.2

on:
  workflow_dispatch:
    inputs:
      week_dir:
        description: "Optional week directory, e.g. output/weekly/2026-05-21. Leave blank to use latest."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate-story-dialogue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate story-only dialogue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          WEEK_DIR: ${{ github.event.inputs.week_dir }}
        run: |
          python scripts/82_test_generate_dialogue_script.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/weekly/**/weekly_dialogue_story_only_v8.json || true
          git add output/weekly/**/weekly_dialogue_story_only_v8.md || true
          git add output/weekly/**/weekly_dialogue_story_only_v8_prompt_debug.txt || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate Step 82 v8 story-only dialogue"
            git push
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: step82-v8-story-dialogue
          path: |
            output/weekly/**/weekly_dialogue_story_only_v8.json
            output/weekly/**/weekly_dialogue_story_only_v8.md
            output/weekly/**/weekly_dialogue_story_only_v8_prompt_debug.txt
          if-no-files-found: warn
