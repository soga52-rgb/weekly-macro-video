# Save as: .github/workflows/build_weekly_slide_images_only_08.yml
name: Build Weekly Slide Images Only (08 Image Model)

on:
  workflow_dispatch:
    inputs:
      week_end_date:
        description: 'Target weekly folder end date, e.g. 2026-05-21'
        required: false
        default: ''
      force_rebuild_slides:
        description: 'Force rebuild slide images'
        required: false
        default: 'true'

env:
  IMAGE_MODEL: gemini-3.1-flash-image-preview
  IMAGE_MODEL_FALLBACKS: gemini-2.5-flash-image

jobs:
  build-slides:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Resolve env
        run: |
          echo "WEEK_END_DATE=${{ github.event.inputs.week_end_date }}" >> $GITHUB_ENV
          echo "FORCE_REBUILD_SLIDES=${{ github.event.inputs.force_rebuild_slides }}" >> $GITHUB_ENV

      - name: Build weekly slide images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/08_build_weekly_slide_images.py

      - name: Upload slide artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-slide-images-${{ github.run_id }}
          path: |
            output/weekly/*/slides/*.png
            output/weekly/*/weekly_slide_images_manifest.json
          if-no-files-found: warn
