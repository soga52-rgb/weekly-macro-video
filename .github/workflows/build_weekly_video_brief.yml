name: Build Weekly Video Brief and Cards

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-weekly-video-brief-and-cards:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.1-flash-lite

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build weekly facts JSON
        run: |
          python scripts/01_build_weekly_facts.py

      - name: Generate weekly video brief
        run: |
          python scripts/02_generate_weekly_brief.py

      - name: Generate weekly brief cards
        run: |
          python scripts/03_generate_brief_cards.py

      - name: Commit generated weekly brief outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly video brief and cards"
            git push
          fi
