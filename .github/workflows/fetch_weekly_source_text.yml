name: Fetch Weekly Source Text

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-weekly-source-text:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      WEEKLY_SOURCE_URL: ${{ secrets.WEEKLY_SOURCE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch weekly source from Apps Script
        run: |
          python scripts/00_fetch_weekly_source_from_apps_script.py

      - name: Commit weekly source text
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/weekly_video_source.json output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fetch weekly source text"
            git push
          fi
