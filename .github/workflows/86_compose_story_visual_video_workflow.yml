name: 86 Compose Story Visual Video

on:
  workflow_dispatch:
    inputs:
      week_directory:
        description: "Optional week directory, e.g. 2026-05-21 or output/weekly/2026-05-21. Leave blank to use latest or analysis_end_date."
        required: false
        default: ""
      analysis_end_date:
        description: "Optional analysis window end date, e.g. 2026-05-28. Used only to resolve week_directory when week_directory is blank."
        required: false
        default: ""
      dialogue_json:
        description: "Optional explicit dialogue json path under repo or relative to week dir. Leave blank to auto-detect story-only dialogue."
        required: false
        default: ""
      force_rebuild:
        description: "Force rebuild even if final video already exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  compose-story-visual-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      INPUT_WEEK_DIRECTORY: ${{ github.event.inputs.week_directory }}
      ANALYSIS_END_DATE: ${{ github.event.inputs.analysis_end_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install pillow

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Resolve target week dir
        run: |
          if [ -n "${INPUT_WEEK_DIRECTORY}" ]; then
            case "${INPUT_WEEK_DIRECTORY}" in
              output/weekly/*)
                echo "WEEK_DIR=${INPUT_WEEK_DIRECTORY}" >> "$GITHUB_ENV"
                ;;
              *)
                echo "WEEK_DIR=output/weekly/${INPUT_WEEK_DIRECTORY}" >> "$GITHUB_ENV"
                ;;
            esac
          elif [ -n "${ANALYSIS_END_DATE}" ]; then
            echo "WEEK_DIR=output/weekly/${ANALYSIS_END_DATE}" >> "$GITHUB_ENV"
          else
            echo "WEEK_DIR=" >> "$GITHUB_ENV"
          fi

      - name: Compose story visual video
        run: |
          CMD=(python scripts/86_compose_story_visual_video.py)

          if [ -n "${WEEK_DIR}" ]; then
            CMD+=(--week-dir "${WEEK_DIR}")
          fi

          if [ -n "${{ github.event.inputs.dialogue_json }}" ]; then
            CMD+=(--dialogue-json "${{ github.event.inputs.dialogue_json }}")
          fi

          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            CMD+=(--force-rebuild)
          fi

          echo "[INFO] Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -n "${WEEK_DIR}" ]; then
            git add "${WEEK_DIR}/story_video/story_visual_video_test.mp4" || true
            git add "${WEEK_DIR}/story_video/story_turn_timeline.json" || true
            git add -u "${WEEK_DIR}/story_video" || true
          else
            git add output/weekly/**/story_video/story_visual_video_test.mp4 || true
            git add output/weekly/**/story_video/story_turn_timeline.json || true
            git add -u output/weekly/**/story_video || true
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Compose story visual video test"
            git push
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: step86-story-visual-video
          path: |
            output/weekly/**/story_video/story_visual_video_test.mp4
            output/weekly/**/story_video/story_turn_timeline.json
