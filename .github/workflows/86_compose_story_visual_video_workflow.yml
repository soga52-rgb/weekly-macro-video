name: 86 Compose Story Visual Video

on:
  workflow_dispatch:
    inputs:
      week_directory:
        description: "Optional week directory, e.g. 2026-05-21 or output/weekly/2026-05-21. Leave blank to use latest."
        required: false
        default: ""
      dialogue_json:
        description: "Optional explicit dialogue json path under repo or relative to week dir. Leave blank to auto-detect story-only dialogue."
        required: false
        default: ""
      force_rebuild:
        description: "Force rebuild even if final video already exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  compose-story-visual-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Ensure ffmpeg exists
        run: ffmpeg -version

      - name: Compose story visual video
        run: |
          CMD=(python scripts/86_compose_story_visual_video.py)

          if [ -n "${{ github.event.inputs.week_directory }}" ]; then
            CMD+=(--week-dir "${{ github.event.inputs.week_directory }}")
          fi

          if [ -n "${{ github.event.inputs.dialogue_json }}" ]; then
            CMD+=(--dialogue-json "${{ github.event.inputs.dialogue_json }}")
          fi

          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            CMD+=(--force-rebuild)
          fi

          echo "[INFO] Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/weekly/**/story_video/story_visual_video_test.mp4 || true
          git add output/weekly/**/story_video/story_turn_timeline.json || true
          git add -u output/weekly/**/story_video || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Compose story visual video test"
            git push
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: step86-story-visual-video
          path: |
            output/weekly/**/story_video/story_visual_video_test.mp4
            output/weekly/**/story_video/story_turn_timeline.json
