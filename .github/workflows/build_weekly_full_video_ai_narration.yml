name: Build Weekly Full Video AI Narration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-weekly-full-video-ai-narration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.5-flash
      GEMINI_TTS_MODEL: gemini-3.1-flash-tts-preview
      GEMINI_TTS_VOICE: Kore
      WEEKLY_VIDEO_SPEED: "1.05"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install gTTS

      - name: Generate AI narration scripts
        run: |
          python scripts/05_generate_narration_ai.py

      - name: Generate Gemini TTS audio
        run: |
          python scripts/06_generate_tts.py

      - name: Build final video with FFmpeg
        run: |
          python scripts/07_build_video_ffmpeg.py

      - name: Commit generated AI narration video outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Build weekly full video with AI narration"
            git push
          fi
