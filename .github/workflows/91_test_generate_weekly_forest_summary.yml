name: 91 Test Generate Weekly Forest Summary

on:
  workflow_dispatch:
    inputs:
      week_dir:
        description: "Optional week folder under output/weekly, e.g. 2026-05-21. Leave blank to use latest."
        required: false
        default: ""
      analysis_model:
        description: "Gemini analysis model"
        required: false
        default: "gemini-3.5-pro"

permissions:
  contents: write

jobs:
  generate-weekly-forest-summary:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_ANALYSIS_MODEL: ${{ inputs.analysis_model }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run 91 test weekly forest summary
        run: |
          if [ -n "${{ inputs.week_dir }}" ]; then
            python scripts/91_test_generate_weekly_forest_summary_v96_keep_4_presentation_pages.py --week-dir "${{ inputs.week_dir }}"
          else
            python scripts/91_test_generate_weekly_forest_summary_v96_keep_4_presentation_pages.py
          fi

      - name: Commit weekly forest summary
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/weekly/**/weekly_forest_summary.json || true

          if git diff --cached --quiet; then
            echo "No weekly_forest_summary.json changes to commit."
          else
            git commit -m "Test weekly forest summary"
            git push
          fi

      - name: Upload summary artifact only
        uses: actions/upload-artifact@v4
        with:
          name: weekly-forest-summary-json
          path: |
            output/weekly/**/weekly_forest_summary.json
          if-no-files-found: warn
