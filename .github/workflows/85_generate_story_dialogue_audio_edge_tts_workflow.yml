name: 85 Generate Story Dialogue Audio edge-tts

on:
  workflow_dispatch:
    inputs:
      week_dir:
        description: "Optional week directory, e.g. 2026-05-21 or output/weekly/2026-05-21. Leave blank to use latest or analysis_end_date."
        required: false
        default: ""
      analysis_end_date:
        description: "Optional analysis window end date, e.g. 2026-05-28. Used only to resolve week_dir when week_dir is blank."
        required: false
        default: ""
      force_rebuild:
        description: "Force rebuild audio even if segment files already exist"
        required: false
        default: "false"
      tom_voice:
        description: "Tom voice"
        required: false
        default: "zh-TW-YunJheNeural"
      miranda_voice:
        description: "Miranda voice"
        required: false
        default: "zh-TW-HsiaoChenNeural"
      tts_rate:
        description: "edge-tts rate, e.g. +0%, +10%, -10%"
        required: false
        default: "-8%"
      tts_volume:
        description: "edge-tts volume, e.g. +0%, +10%, -10%"
        required: false
        default: "+0%"
      tom_pitch:
        description: "Tom pitch, e.g. -5Hz, +0Hz"
        required: false
        default: "-5Hz"
      miranda_pitch:
        description: "Miranda pitch, e.g. +0Hz"
        required: false
        default: "+0Hz"

permissions:
  contents: write

jobs:
  generate-story-dialogue-audio:
    runs-on: ubuntu-latest

    env:
      INPUT_WEEK_DIR: ${{ github.event.inputs.week_dir }}
      ANALYSIS_END_DATE: ${{ github.event.inputs.analysis_end_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install edge-tts
        run: |
          python -m pip install --upgrade pip
          python -m pip install edge-tts

      - name: Resolve target week dir
        run: |
          if [ -n "${INPUT_WEEK_DIR}" ]; then
            case "${INPUT_WEEK_DIR}" in
              output/weekly/*)
                echo "WEEK_DIR=${INPUT_WEEK_DIR}" >> "$GITHUB_ENV"
                ;;
              *)
                echo "WEEK_DIR=output/weekly/${INPUT_WEEK_DIR}" >> "$GITHUB_ENV"
                ;;
            esac
          elif [ -n "${ANALYSIS_END_DATE}" ]; then
            echo "WEEK_DIR=output/weekly/${ANALYSIS_END_DATE}" >> "$GITHUB_ENV"
          else
            echo "WEEK_DIR=" >> "$GITHUB_ENV"
          fi

      - name: Generate story dialogue audio
        env:
          FORCE_REBUILD_AUDIO: ${{ github.event.inputs.force_rebuild }}
          TOM_VOICE: ${{ github.event.inputs.tom_voice }}
          MIRANDA_VOICE: ${{ github.event.inputs.miranda_voice }}
          TTS_RATE: ${{ github.event.inputs.tts_rate }}
          TTS_VOLUME: ${{ github.event.inputs.tts_volume }}
          TOM_PITCH: ${{ github.event.inputs.tom_pitch }}
          MIRANDA_PITCH: ${{ github.event.inputs.miranda_pitch }}
        run: |
          python scripts/85_generate_story_dialogue_audio_edge_tts.py

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -n "${WEEK_DIR}" ]; then
            git add "${WEEK_DIR}/story_audio/**" || true
          else
            git add output/weekly/**/story_audio/** || true
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Generate Step 85 story dialogue audio"
            git push
          fi

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: step85-story-dialogue-audio
          path: |
            output/weekly/**/story_audio/**
          if-no-files-found: warn
