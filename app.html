<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="本週總經摘要">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>本週總經摘要</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    #frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }
    #fallback {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #e5e7eb;
      text-align: center;
      line-height: 1.7;
    }
    #fallback a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <iframe id="frame" title="本週總經摘要"></iframe>
  <div id="fallback" style="display:none;">
    <div>
      <div>正在載入本週總經摘要...</div>
      <div id="fallback-link"></div>
    </div>
  </div>
  <script>
    async function loadLatest() {
      const fallback = document.getElementById("fallback");
      const fallbackLink = document.getElementById("fallback-link");
      const frame = document.getElementById("frame");

      try {
        const res = await fetch("./latest.json?ts=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("latest.json HTTP " + res.status);

        const latest = await res.json();
        const target = "./" + latest.target_path + "?v=" + encodeURIComponent(latest.version) + "&ts=" + Date.now();

        frame.src = target;
        fallback.style.display = "none";
      } catch (err) {
        fallback.style.display = "flex";
        fallbackLink.innerHTML = '<a href="./latest.html?ts=' + Date.now() + '">改用 latest.html 開啟</a>';
        console.error(err);
      }
    }

    loadLatest();
    document.addEventListener("visibilitychange", function () {
      if (!document.hidden) loadLatest();
    });
  </script>
</body>
</html>
